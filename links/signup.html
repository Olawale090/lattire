<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/signup.css">
    <link rel="shortcut icon" href="../assets/icons/company_logo.svg" type="image/x-icon">
    <title>Sign up</title>
</head>
<body>
    <div class="navbar mainbar">
        <div class="left_menu">
            <img src="../assets/icons/companyicon.svg" alt="company icon" class="img mainIcon">
        </div>  
    </div>

    <section class="form_container">
        <form action="" method="post" class="form_plate">
            <p>
                <label for="">E-mail</label> <br>
                <input type="text" name="" placeholder="Please enter email" class="input_email">
            </p>

            <p>
                <label for="">Username</label> <br>
                <input type="text" name="" placeholder="Please enter username" class="input_username">
            </p>
            
            <p>
                <label for="">Password</label> <br>
                <input type="text" name="" placeholder="Please enter password" class="input_password">
            </p>
            
            <p>
                <label for="">Confirm password</label> <br>
                <input type="text" name="" placeholder="Please confirm password">
            </p>

            <p>
                <input type="submit" name="" value="Submit" class="submit_btn">
            </p> 

            <p>
                <input type="submit" name="" placeholder="Confirm password" value="Sign up with facebook" class="facebook_btn">
            </p>

            <label for="" class="account_label">Have an account?</label><a href="login.html" class="sign_in"> Sign in</a>

            <footer class="notification">Please enter correct email</footer>
        </form>
    </section>
</body>
</html>
