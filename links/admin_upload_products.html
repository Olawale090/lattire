<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/signup.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/adminpage.css">
    <link rel="stylesheet" href="../styles/useraccount.css">
    <link rel="stylesheet" href="../styles/admin_upload_products.css">

    <script type="module" async src="../script/adminaccount.js"></script>

    <link rel="shortcut icon" href="../assets/icons/company_logo.svg" type="image/x-icon">
    <title>Upload products</title>
</head>
<body>
    <div class="navbar mainbar">

        <div class="left_menu">
            <img src="../assets/icons/companyicon.svg" alt="company icon" class="img mainIcon">
        </div>

        <div class="right_menu">
            <li><img src="../assets/icons/042-menu.svg" style="margin-top: 0.25em; margin-right:1em;" alt="company icon" class="img menuicon admin_account_menu_btn"></li>
            <li class="admin_icon">
                <div class="admin_img_container">  </div> 
            </li>
            <li class="username padd pr_username"> Username</li>
            <li class="padd" style="color:rgb(63, 63, 63);"> Administrator account </li>
        </div>
        
    </div>
    
    <div class="admin_account_menu mobile_hide_toggle">
        <li class="admin_account_list"><a href="adminpage.html"> Dashboard </a></li>
        <li class="admin_account_list"><a href="manageproduct.html">Manage Products </a></li>
        <li class="admin_account_list"><a href="admin_manage_newsletter.html">Manage newsletter </a></li>
        <li class="admin_account_list"><a href="admin_active_customers.html">Active customers</a></li>
        <li class="admin_account_list"><a href="admin_product_delivery.html">Deliveries</a></li>
        <li class="admin_account_list"><a href="admin_questions.html">Questions</a></li>
        <li class="admin_account_list"><a href="admin_inactive_customers.html">Inactive customers</a></li>
        <li class="admin_account_list"><a href="admin_payment.html">Payments</a></li>
        <li class="admin_account_list"><a href="paystack...">Payment issues</a></li>
        <li class="admin_account_list"><a href="sessiong closed">Log out </a></li>
    </div>

    <header class="head_title">
         Upload product 
    </header>

    <section class="upload_prod_form_container">

        <div class="user_first_profile">
            <img src="../product_pics/blue-background-close-up-clothing-1579063.jpg" alt="User image" class="user_image">
            <p>
                <label for="" style="margin-left: 1em;">Upload new picture</label> <br>
                <input type="file" class="upload_btn"  style="margin-left: 0;">
                <button class="edit_btn choosepic"> Choose new picture</button>
                <button class="change_btn uploadchange_btn">Change</button>
            </p>
        </div>


        <form action="" method="post" class="user_profile_form">

            <p>
                <label for="">Product category</label> <br>
                <input type="text" class="username settings_input" placeholder="Please enter product category">
            </p>

            <p>
                <label for="">Product name</label> <br>
                <input type="text" class="email settings_input" placeholder="Please enter product name">
            </p>

            <p>
                <label for="">Product details</label> <br>
                <input type="text" class="phone settings_input" placeholder="Please enter your product details">
            </p>
            
            <p>
                <label for="">Product price</label> <br>
                <input type="text" class="private_pass settings_input" placeholder="Please enter your product price">
            </p>
            
            <p>
                <label for="">Product quantity</label> <br>
                <input type="text" class="country settings_input" placeholder="Please enter product quantity">
            </p>
            <button type="submit" class="upload_submit_btn" style="border-radius:0.2em;">Upload product</button>
        </form>
    </section>
</body>
</html>
