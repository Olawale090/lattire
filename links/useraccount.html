<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/icons/company_logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/full_detail.css">
    <link rel="stylesheet" href="../styles/useraccount.css">
    <title>User account settings</title>
</head>
<body>
    <div class="navbar mainbar">

        <div class="left_menu">
            <img src="../assets/icons/companyicon.svg" alt="company icon" class="img mainIcon">
        </div>

        <input type="text" name="" id="" placeholder="Search products here" class="main_search">

        <div class="right_menu">
            <li><img src="../assets/icons/042-menu.svg" alt="company icon" class="img menuicon"></li>
            <li class="usericon">
                <div class="userimg_container">  </div> 
            </li>
            <li class="username padd pr_username"> Username</li>
            <li class="padd">Help</li>
        </div>
        
    </div>

    <div class="pagetitle">
        <img src="../assets/icons/013-settings.svg" alt=" settings" class="settings_icon"> 
        <li class="settings_head"> User profile settings </li>
    </div>

    <section class="settings_section">

        <div class="user_first_profile">
            <img src="../assets/pics/attractive-beautiful-beauty-206560.jpg" alt="User image" class="user_image">
            <p>
                <div class="user_info">Akindele Victoria</div><br>
                <div class="user_city">Ibadan  <br> 
                    <input type="text" class="user_location settings_input" placeholder="change your location">
                    <button class="edit_btn">Edit</button> <button class="change_btn">Change</button>
                </div> 

                <div class="user_delivery_city">

                    <div class="delivery_location_title">
                        Delivery location:  
                    </div>

                    <div class="delivery_location_address">
                        Bodija garage, No.45 post office Oyo state 
                    </div>
                </div> 
                
            </p>
        </div>

        <form action="" method="post" class="user_profile_form">
            <p>
                <label for="">Upload new picture</label> <br>
                <input type="file" class="upload_btn">
                <button class="edit_btn choosepic"> Choose new picture</button>
                <button class="change_btn uploadchange_btn">Change</button>
            </p>

            <p>
                <label for="">Username</label> <br>
                <input type="text" class="username settings_input" placeholder="Please enter username">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>

            <p>
                <label for="">Email</label> <br>
                <input type="text" class="email settings_input" placeholder="Please enter your email">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>

            <p>
                <label for="">Phone Number</label> <br>
                <input type="text" class="phone settings_input" placeholder="Please enter your phone number">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>
            
            <p>
                <label for="">Private password</label> <br>
                <input type="text" class="private_pass settings_input" placeholder="Please enter your private password">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>
            
            <p>
                <label for="">Country</label> <br>
                <input type="text" class="country settings_input" placeholder="Please enter country">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>

            <p>
                <label for="">State</label> <br>
                <input type="text" class="state settings_input" placeholder="Please enter state">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>
            
            <p>
                <label for="">City</label> <br>
                <input type="text" class="city settings_input" placeholder="Please enter city">
                <button class="edit_btn">Edit</button>
                <button class="change_btn">Change</button>
            </p>
        </form>
    </section>

    <section class="googlemap_delivery">
        <h1>Google map here</h1>
    </section>
</body>
</html>
